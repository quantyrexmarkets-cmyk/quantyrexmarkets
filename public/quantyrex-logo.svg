<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="200" r="95" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.3"/>
  
  <!-- Inner Hexagon -->
  <polygon points="256,115 326,155 326,235 256,275 186,235 186,155" 
           fill="none" stroke="#6366f1" stroke-width="2.5"/>
  
  <!-- Q Letter - Stylized -->
  <circle cx="256" cy="195" r="45" fill="none" stroke="url(#accentGrad)" stroke-width="8"/>
  <line x1="280" y1="220" x2="310" y2="250" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Accent Dot -->
  <circle cx="310" cy="250" r="6" fill="#f59e0b"/>
  
  <!-- QUANTYREX Text -->
  <text x="256" y="340" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="48" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="3">
    QUANTYREX
  </text>
  
  <!-- MARKETS Text -->
  <text x="256" y="380" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="24" 
        font-weight="400" 
        fill="#6366f1" 
        text-anchor="middle" 
        letter-spacing="8">
    MARKETS
  </text>
  
  <!-- Tagline -->
  <text x="256" y="420" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="12" 
        font-weight="300" 
        fill="#666666" 
        text-anchor="middle" 
        letter-spacing="2">
    YOUR GATEWAY TO FINANCIAL FREEDOM
  </text>
  
  <!-- Bottom accent line -->
  <line x1="156" y1="450" x2="356" y2="450" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
</svg>
