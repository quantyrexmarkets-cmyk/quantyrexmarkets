<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="emailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="80" fill="#0a0a0a"/>
  
  <!-- Icon -->
  <g transform="translate(20, 15)">
    <!-- Hexagon -->
    <polygon points="25,5 45,15 45,35 25,45 5,35 5,15" 
             fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <!-- Q Circle -->
    <circle cx="25" cy="25" r="12" fill="none" stroke="url(#emailGrad)" stroke-width="2.5"/>
    <!-- Q Tail -->
    <line x1="33" y1="33" x2="42" y2="42" stroke="url(#emailGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Dot -->
    <circle cx="42" cy="42" r="2" fill="#f59e0b"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="38" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="#ffffff" 
        letter-spacing="1">
    QUANTYREX
  </text>
  <text x="80" y="56" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="12" 
        font-weight="400" 
        fill="#6366f1" 
        letter-spacing="4">
    MARKETS
  </text>
</svg>
