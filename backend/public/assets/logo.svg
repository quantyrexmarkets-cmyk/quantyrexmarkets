<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0a0a0a"/>
  
  <!-- Hexagon Border -->
  <polygon points="100,25 155,55 155,125 100,155 45,125 45,55" 
           fill="none" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
  
  <!-- Q Circle -->
  <circle cx="100" cy="90" r="40" fill="none" stroke="url(#iconGrad)" stroke-width="7"/>
  
  <!-- Q Tail -->
  <line x1="125" y1="115" x2="155" y2="145" stroke="url(#iconGrad)" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Accent Dot -->
  <circle cx="155" cy="145" r="5" fill="#f59e0b"/>
</svg>
